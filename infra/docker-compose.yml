version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: digitalhub-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: digitalhub
      POSTGRES_USER: digitalhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: digitalhub-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://digitalhub:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/digitalhub
      SYNC_API_KEY: ${SYNC_API_KEY}
      PORT: 3001
    depends_on:
      - postgres

  ai-workspace:
    build:
      context: ../
      dockerfile: infra/ai-developer-workspace/Dockerfile
    container_name: ai-developer-workspace
    restart: always
    ports:
      - "8080:8080"
    volumes:
      # Mount the entire source code repository for Git operations
      - ../:/app/repo
      # Mount data volume to store the SQLite deduplication DB
      - listener_data:/app/data
      # Mount Hermes configuration and memory to persist across upgrades
      - ~/.hermes:/root/.hermes
      # Mount SSH keys from the Host so the bot can push code to GitHub
      - ~/.ssh:/root/.ssh:ro
      # Mount GitHub CLI config (if using `gh auth login` instead of SSH)
      - ~/.config/gh:/root/.config/gh:ro
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - BASE_REPO=${BASE_REPO:-/app/repo}
      - WORKTREES_DIR=${WORKTREES_DIR:-/app/worktrees}
      - DEDUP_DB=${DEDUP_DB:-/app/data/ai-workspace.db}
      - PORT=8080
      - HERMES_BIN=${HERMES_BIN:-hermes}

  # Cloudflare Tunnel — routes public traffic to internal services, no open ports needed
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: digitalhub-tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
      - ai-workspace

volumes:
  pgdata:
  listener_data:
