services:
  postgres:
    image: postgres:16-alpine
    container_name: digitalhub-postgres
    restart: always
    ports:
      - "127.0.0.1:5435:5432"
    environment:
      POSTGRES_DB: digitalhub
      POSTGRES_USER: digitalhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: digitalhub-api
    restart: always
    ports:
      - "127.0.0.1:3005:3001"
    environment:
      DATABASE_URL: postgres://digitalhub:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/digitalhub
      SYNC_API_KEY: ${SYNC_API_KEY}
      NINE_ROUTER_API_KEY: ${NINE_ROUTER_API_KEY}
      NINE_ROUTER_URL: ${NINE_ROUTER_URL}
      NINE_ROUTER_MODEL: ${NINE_ROUTER_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SENTRY_DSN_BE: ${SENTRY_DSN_BE}
      SENTRY_PROJECT_BE: ${SENTRY_PROJECT_BE}
      GH_PAT: ${GH_PAT}
      RUN_MIGRATIONS_ON_START: ${RUN_MIGRATIONS_ON_START:-true}
      PORT: 3001
    depends_on:
      - postgres
    volumes:
      - api_uploads:/app/uploads

  hermes-gateway:
    build:
      context: ../
      dockerfile: infra/hermes-gateway/Dockerfile
    container_name: hermes-gateway
    restart: always
    volumes:
      - ../:/app/repo
      - hermes_data:/root/.hermes
      - /root/.config/gh:/root/.config/gh
      - hermes_db_data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=9119
      - GH_TOKEN=${GH_PAT}
      - NINE_ROUTER_API_KEY=${NINE_ROUTER_API_KEY}
      - NINE_ROUTER_URL=${NINE_ROUTER_URL}
      - NINE_ROUTER_MODEL=${NINE_ROUTER_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONPATH=/app/repo/infra/patches
      - BASE_REPO=/app/repo
      - WORKTREES_DIR=/app/worktrees
      - DEDUP_DB=/app/data/ai-workspace.db
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY}
      - SYNC_API_KEY=${SYNC_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    command: [ "hermes", "gateway", "run" ]

  hermes-dashboard:
    build:
      context: ../
      dockerfile: infra/hermes-gateway/Dockerfile
    container_name: hermes-dashboard
    restart: always
    depends_on:
      - hermes-gateway
    volumes:
      - ../:/app/repo
      - hermes_data:/root/.hermes
      - hermes_db_data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=9119
      - GH_TOKEN=${GH_PAT}
      - NINE_ROUTER_API_KEY=${NINE_ROUTER_API_KEY}
      - NINE_ROUTER_URL=${NINE_ROUTER_URL}
      - NINE_ROUTER_MODEL=${NINE_ROUTER_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONPATH=/app/repo/infra/patches
      - BASE_REPO=/app/repo
      - WORKTREES_DIR=/app/worktrees
      - DEDUP_DB=/app/data/ai-workspace.db
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY}
      - SYNC_API_KEY=${SYNC_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    command: [ "hermes", "dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure" ]

  # Cloudflare Tunnel — routes public traffic to internal services, no open ports needed
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: digitalhub-tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
      - hermes-dashboard

volumes:
  pgdata:
  hermes_data:
  hermes_db_data:
  api_uploads:
