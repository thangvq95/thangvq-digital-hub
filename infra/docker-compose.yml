services:
  postgres:
    image: postgres:16-alpine
    container_name: digitalhub-postgres
    restart: always
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: digitalhub
      POSTGRES_USER: digitalhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: digitalhub-api
    restart: always
    ports:
      - "3005:3001"
    environment:
      DATABASE_URL: postgres://digitalhub:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/digitalhub
      SYNC_API_KEY: ${SYNC_API_KEY}
      NINE_ROUTER_API_KEY: ${NINE_ROUTER_API_KEY}
      NINE_ROUTER_URL: ${NINE_ROUTER_URL}
      NINE_ROUTER_MODEL: ${NINE_ROUTER_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 3001
    depends_on:
      - postgres

  ai-workspace:
    build:
      context: ../
      dockerfile: infra/ai-developer-workspace/Dockerfile
    container_name: ai-developer-workspace
    restart: always
    ports:
      - "8085:8080"
    volumes:
      # Mount the host directory where all your projects live (for multi-repo)
      # On VPS, change this to where you clone your repos, e.g., /var/www or /opt
      - ../:/app/repo
      # Mount data volume to store the SQLite deduplication DB
      - listener_data:/app/data
      # Use Named Volumes for AI Brains (persistent on VPS)
      - hermes_data:/root/.hermes
      - gitnexus_data:/root/.gitnexus
      # Mount SSH keys from the Host so the bot can push code to GitHub (if needed)
      - ~/.ssh:/root/.ssh:ro
      # Mount GitHub CLI config (if using `gh auth login` instead of SSH)
      - ~/.config/gh:/root/.config/gh:ro
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - BASE_REPO=${BASE_REPO:-/app/repo}
      - WORKTREES_DIR=${WORKTREES_DIR:-/app/worktrees}
      - DEDUP_DB=${DEDUP_DB:-/app/data/ai-workspace.db}
      - PORT=8080
      - HERMES_BIN=${HERMES_BIN:-hermes}

  hermes-gateway:
    build:
      context: ../
      dockerfile: infra/ai-developer-workspace/Dockerfile
    container_name: hermes-gateway
    restart: always
    volumes:
      - ../:/app/repo
      - hermes_data:/root/.hermes
    environment:
      - HOST=0.0.0.0
      - PORT=9119
    command: [ "hermes", "gateway", "start" ]

  # Cloudflare Tunnel — routes public traffic to internal services, no open ports needed
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: digitalhub-tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
      - ai-workspace

volumes:
  pgdata:
  listener_data:
  hermes_data:
  gitnexus_data:
