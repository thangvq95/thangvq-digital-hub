on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: "Release & Versioning Management"

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.GH_PAT }}
          # this will ensure that the major version is not bumped automatically
          # unless you want that, then you can configure release-please further.

      # Automatically enable auto-merge for Release PRs when CI passes
      # Only runs when release-please creates or updates a Release PR
      - name: Auto-merge Release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh pr merge --auto --squash "${{ fromJson(steps.release.outputs.pr).number }}" --repo "$GITHUB_REPOSITORY"
