on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-main-to-develop
  cancel-in-progress: false

name: "Release & Versioning Management"

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.GH_PAT }}
          # this will ensure that the major version is not bumped automatically
          # unless you want that, then you can configure release-please further.

      # Automatically enable auto-merge for Release PRs when CI passes
      # Only runs when release-please creates or updates a Release PR
      - name: Auto-merge Release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh pr merge --auto --squash "${{ fromJson(steps.release.outputs.pr).number }}" --repo "$GITHUB_REPOSITORY"

  sync-develop:
    name: Sync Main into Develop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch all branches from origin
          git fetch origin
          
          # Checkout develop branch
          git checkout develop
          
          # Merge origin/main into develop
          git merge origin/main --no-edit -m "chore: merge main into develop"
          
          # Push the changes back to origin/develop
          git push origin develop

