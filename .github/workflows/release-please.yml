on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: "Release & Versioning Management"

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          # this will ensure that the major version is not bumped automatically
          # unless you want that, then you can configure release-please further.
